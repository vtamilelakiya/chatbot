<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RVCE Chat Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #00242c; font-family: 'Poppins', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }
        .chat-container { width: 95%; max-width: 550px; height: 85vh; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border-radius: 30px; border: 1px solid #4db6ac; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .chat-header { background: #4db6ac; padding: 20px; color: #00242c; font-weight: 600; text-align: center; font-size: 18px; text-transform: uppercase; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        /* Message Styling */
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 85%; font-size: 14px; line-height: 1.6; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: #4db6ac; color: #00242c; border-bottom-right-radius: 2px; }
        .bot-msg { align-self: flex-start; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(77, 182, 172, 0.3); color: white; border-bottom-left-radius: 2px; }
        
        /* Link Styling - This makes the Drive link clickable and visible */
        .bot-msg a { color: #4db6ac; font-weight: bold; text-decoration: underline; }
        
        .input-area { padding: 20px; display: flex; gap: 10px; background: rgba(0, 0, 0, 0.3); }
        input { flex: 1; padding: 15px; border-radius: 50px; border: 1px solid #4db6ac; background: transparent; color: white; outline: none; }
        button { padding: 0 25px; border-radius: 50px; border: none; background: #4db6ac; color: #00242c; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #399d94; }

        /* Scrollbar styling */
        #chat-box::-webkit-scrollbar { width: 5px; }
        #chat-box::-webkit-scrollbar-thumb { background: #4db6ac; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">RVCE ADMISSION ASSISTANT</div>
        <div id="chat-box">
            <div class="msg bot-msg">
                Welcome <b>{{ name }}</b>! 👋<br>
                How can I assist you today? You can ask about <b>Courses, Labs, Food, Placement,</b> or <b>About College</b>.
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your query..." autocomplete="off">
            <button id="send-btn">SEND</button>
        </div>
    </div>

    <script>
        const input = document.getElementById("user-input");
        const btn = document.getElementById("send-btn");
        const chatBox = document.getElementById("chat-box");

        function sendMessage() {
            const userText = input.value.trim();
            if (!userText) return;

            // User message add panradhu
            chatBox.innerHTML += `<div class="msg user-msg">${userText}</div>`;
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            // Backend kku call anupuradhu
            fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: userText })
            })
            .then(res => res.json())
            .then(data => {
                // Bot response-ah innerHTML-ah podanum, appo dhan link work aagum
                chatBox.innerHTML += `<div class="msg bot-msg">${data.response}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            })
            .catch(err => {
                console.error("Error:", err);
            });
        }

        btn.addEventListener("click", sendMessage);
        input.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>

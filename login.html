<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RVCE Admission Enquiry</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4db6ac;
            --secondary-color: #00897b;
            --bg-dark: #00242c;
            --glass-bg: rgba(255, 255, 255, 0.07);
        }

        body {
            background: radial-gradient(circle at top left, #004d40, #00242c);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        /* Background Design Elements */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            filter: blur(80px);
            z-index: -1;
            opacity: 0.2;
        }

        /* Enquiry Card Container */
        .enquiry-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
            width: 380px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .enquiry-card h2 {
            margin: 0;
            font-size: 26px;
            letter-spacing: 2px;
            color: var(--primary-color);
            text-transform: uppercase;
            font-weight: 600;
        }

        .enquiry-card p {
            font-size: 13px;
            margin: 10px 0 35px 0;
            opacity: 0.7;
            letter-spacing: 1px;
        }

        /* Form Styling */
        .input-group {
            margin-bottom: 20px;
        }

        /* IMPORTANT: 'name' matches app.py logic for Database saving */
        input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            outline: none;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            box-sizing: border-box;
            font-size: 15px;
            transition: 0.4s;
            text-align: center;
        }

        input:focus {
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 15px rgba(77, 182, 172, 0.3);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* Enquiry Button */
        .enquiry-btn {
            width: 100%;
            padding: 16px;
            margin-top: 15px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--bg-dark);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .enquiry-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 25px rgba(77, 182, 172, 0.4);
            filter: brightness(1.1);
        }

        .footer-text {
            margin-top: 30px;
            font-size: 11px;
            opacity: 0.4;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="circle" style="width: 300px; height: 300px; top: -100px; left: -100px;"></div>
    <div class="circle" style="width: 250px; height: 250px; bottom: -80px; right: -80px;"></div>

    <div class="enquiry-card">
        <h2>Admission</h2>
        <p>College Enquiry Portal</p>
        
        <form action="/" method="POST">
            <div class="input-group">
                <input type="text" name="u_name" placeholder="Your Name" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <input type="text" name="u_mobile" placeholder="Mobile" required autocomplete="off">
            </div>
            
            <button type="submit" class="enquiry-btn">START ENQUIRY</button>
        </form>

        <div class="footer-text">
            © 2026 RVCE Smart Systems
        </div>
    </div>

</body>
</html>
